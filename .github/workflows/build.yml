name: build

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build:
    name: build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Tangelo.sln

      - name: Build
        run: dotnet build Tangelo.sln

      - name: Test
        run: dotnet test Tangelo.sln
